<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TwitchSplit</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --purple: #9147ff;
    --purple-dark: #6441a5;
    --bg: #0e0e10;
    --surface: #18181b;
    --surface2: #1f1f23;
    --border: #2d2d35;
    --text: #efeff1;
    --muted: #adadb8;
    --accent: #00e5ff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Rajdhani', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
  }

  /* PASSWORD GATE */
  #gate {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    gap: 0;
  }

  #gate::before {
    content: '';
    position: absolute;
    inset: 0;
    background: 
      radial-gradient(ellipse at 30% 50%, rgba(145, 71, 255, 0.12) 0%, transparent 60%),
      radial-gradient(ellipse at 70% 50%, rgba(0, 229, 255, 0.06) 0%, transparent 60%);
    pointer-events: none;
  }

  .gate-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3rem, 8vw, 6rem);
    letter-spacing: 0.05em;
    background: linear-gradient(135deg, var(--purple) 0%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.2em;
    animation: fadeDown 0.6s ease both;
  }

  .gate-sub {
    color: var(--muted);
    font-size: 1.1rem;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 3rem;
    animation: fadeDown 0.6s 0.1s ease both;
  }

  .gate-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2.5rem 3rem;
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    gap: 1.2rem;
    animation: fadeUp 0.6s 0.2s ease both;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(145,71,255,0.1);
  }

  .gate-label {
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .gate-input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.85rem 1.1rem;
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.1rem;
    font-weight: 600;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    width: 100%;
  }

  .gate-input:focus {
    border-color: var(--purple);
    box-shadow: 0 0 0 3px rgba(145,71,255,0.2);
  }

  .gate-input.error {
    border-color: #ff4d4d;
    animation: shake 0.4s ease;
  }

  .gate-btn {
    background: linear-gradient(135deg, var(--purple), var(--purple-dark));
    border: none;
    border-radius: 8px;
    padding: 1rem;
    color: white;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 20px rgba(145,71,255,0.4);
  }

  .gate-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(145,71,255,0.5);
  }

  .gate-btn:active { transform: translateY(0); }

  .gate-error {
    color: #ff6b6b;
    font-size: 0.9rem;
    font-weight: 600;
    text-align: center;
    min-height: 1.2em;
    letter-spacing: 0.05em;
  }

  .gate-hint {
    text-align: center;
    color: var(--muted);
    font-size: 0.82rem;
    letter-spacing: 0.05em;
  }

  /* MAIN APP */
  #app {
    display: none;
    height: 100vh;
    flex-direction: column;
  }

  #app.visible { display: flex; }

  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 1.5rem;
    height: 52px;
    gap: 1.5rem;
    flex-shrink: 0;
    z-index: 10;
  }

  .topbar-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 0.05em;
    background: linear-gradient(135deg, var(--purple), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    white-space: nowrap;
  }

  .topbar-divider {
    width: 1px;
    height: 24px;
    background: var(--border);
  }

  .stream-control {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    flex: 1;
  }

  .stream-tag {
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--purple);
    white-space: nowrap;
  }

  .stream-input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.4rem 0.8rem;
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    outline: none;
    width: 180px;
    transition: border-color 0.2s;
  }

  .stream-input:focus { border-color: var(--purple); }

  .load-btn {
    background: var(--purple);
    border: none;
    border-radius: 6px;
    padding: 0.4rem 0.9rem;
    color: white;
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }

  .load-btn:hover { background: var(--purple-dark); }

  .mela-badge {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    background: rgba(145,71,255,0.15);
    border: 1px solid rgba(145,71,255,0.3);
    border-radius: 20px;
    padding: 0.3rem 0.9rem;
    cursor: pointer;
    transition: background 0.2s;
    text-decoration: none;
    color: var(--text);
  }

  .mela-badge:hover { background: rgba(145,71,255,0.25); }

  .live-dot {
    width: 8px; height: 8px;
    background: #ff4d4d;
    border-radius: 50%;
    animation: pulse 1.5s ease infinite;
  }

  .mela-badge span {
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.05em;
  }

  /* CONTENT AREA */
  .content {
    display: flex;
    flex: 1;
    overflow: hidden;
    gap: 4px;
    background: var(--bg);
    padding: 4px;
  }

  .streams-col {
    display: flex;
    flex-direction: column;
    flex: 1;
    gap: 4px;
    min-width: 0;
  }

  .stream-wrapper {
    flex: 1;
    background: var(--surface2);
    border-radius: 8px;
    overflow: hidden;
    position: relative;
    border: 1px solid var(--border);
  }

  .stream-wrapper iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  .stream-placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    color: var(--muted);
  }

  .stream-placeholder .ph-icon {
    font-size: 3rem;
    opacity: 0.3;
  }

  .stream-placeholder .ph-text {
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    opacity: 0.5;
  }

  .stream-num-badge {
    position: absolute;
    top: 10px;
    left: 10px;
    background: rgba(0,0,0,0.7);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 8px;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--purple);
    text-transform: uppercase;
    pointer-events: none;
  }

  .chats-col {
    display: flex;
    gap: 4px;
    width: 480px;
    flex-shrink: 0;
  }

  .chat-wrapper {
    flex: 1;
    background: var(--surface2);
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
  }

  .chat-header {
    padding: 8px 12px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--purple);
  }

  .chat-wrapper iframe {
    flex: 1;
    border: none;
    width: 100%;
  }

  /* ANIMATIONS */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%,60% { transform: translateX(-8px); }
    40%,80% { transform: translateX(8px); }
  }
  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .gate-fade-out {
    animation: gateOut 0.5s ease forwards;
  }
  @keyframes gateOut {
    to { opacity: 0; transform: scale(1.03); pointer-events: none; }
  }
</style>
</head>
<body>

<!-- PASSWORD GATE -->
<div id="gate">
  <div class="gate-logo">TwitchSplit</div>
  <div class="gate-sub">Streamy bez kompromisów</div>
  <div class="gate-card">
    <label class="gate-label">Hasło dostępu</label>
    <input type="password" class="gate-input" id="pwInput" placeholder="Wpisz hasło..." autocomplete="off">
    <div class="gate-error" id="pwError"></div>
    <button class="gate-btn" onclick="checkPw()">Wejdź</button>
    <div class="gate-hint">Strona prywatna · MelaPustelnik</div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-logo">TwitchSplit</div>
    <div class="topbar-divider"></div>

    <!-- Stream 1 control -->
    <div class="stream-control">
      <span class="stream-tag">Stream 1</span>
      <input type="text" class="stream-input" id="s1input" placeholder="nick na Twitchu..." value="">
      <button class="load-btn" onclick="loadStream(1)">Załaduj</button>
    </div>

    <div class="topbar-divider"></div>

    <!-- Stream 2 control -->
    <div class="stream-control">
      <span class="stream-tag">Stream 2</span>
      <input type="text" class="stream-input" id="s2input" placeholder="nick na Twitchu..." value="">
      <button class="load-btn" onclick="loadStream(2)">Załaduj</button>
    </div>

    <!-- Host badge -->
    <a href="https://twitch.tv/MelaPustelnik" target="_blank" class="mela-badge">
      <div class="live-dot"></div>
      <span>MelaPustelnik</span>
    </a>
  </div>

  <div class="content">
    <div class="streams-col">
      <div class="stream-wrapper" id="sw1">
        <div class="stream-placeholder">
          <div class="ph-icon">📺</div>
          <div class="ph-text">Wpisz nick i załaduj stream 1</div>
        </div>
        <div class="stream-num-badge">Stream 1</div>
      </div>
      <div class="stream-wrapper" id="sw2">
        <div class="stream-placeholder">
          <div class="ph-icon">📺</div>
          <div class="ph-text">Wpisz nick i załaduj stream 2</div>
        </div>
        <div class="stream-num-badge">Stream 2</div>
      </div>
    </div>

    <div class="chats-col">
      <div class="chat-wrapper" id="cw1">
        <div class="chat-header">Chat 1</div>
        <iframe id="chatFrame1" src="about:blank"></iframe>
      </div>
      <div class="chat-wrapper" id="cw2">
        <div class="chat-header">Chat 2</div>
        <iframe id="chatFrame2" src="about:blank"></iframe>
      </div>
    </div>
  </div>
</div>

<script>
  const PASSWORD = 'cwel';
  const HOST = window.location.hostname || 'localhost';

  function checkPw() {
    const val = document.getElementById('pwInput').value;
    const err = document.getElementById('pwError');
    const inp = document.getElementById('pwInput');

    if (val.toLowerCase() === PASSWORD) {
      const gate = document.getElementById('gate');
      gate.classList.add('gate-fade-out');
      setTimeout(() => {
        gate.style.display = 'none';
        document.getElementById('app').classList.add('visible');
        // Auto-load MelaPustelnik on stream 1
        document.getElementById('s1input').value = 'MelaPustelnik';
        loadStream(1);
      }, 500);
    } else {
      err.textContent = 'Złe hasło, spróbuj ponownie.';
      inp.classList.add('error');
      inp.value = '';
      setTimeout(() => inp.classList.remove('error'), 600);
    }
  }

  document.getElementById('pwInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') checkPw();
    document.getElementById('pwError').textContent = '';
  });

  function loadStream(num) {
    const input = document.getElementById(`s${num}input`);
    const channel = input.value.trim();
    if (!channel) return;

    const parent = HOST === 'localhost' ? 'localhost' : HOST;

    // Stream iframe
    const sw = document.getElementById(`sw${num}`);
    sw.innerHTML = `<div class="stream-num-badge">Stream ${num}</div>`;
    const iframe = document.createElement('iframe');
    iframe.src = `https://player.twitch.tv/?channel=${encodeURIComponent(channel)}&parent=${parent}&muted=${num === 2 ? 'true' : 'false'}&layout=video`;
    iframe.allowFullscreen = true;
    iframe.allow = "autoplay; fullscreen";
    sw.appendChild(iframe);

    // Chat iframe
    const chatFrame = document.getElementById(`chatFrame${num}`);
    chatFrame.src = `https://www.twitch.tv/embed/${encodeURIComponent(channel)}/chat?parent=${parent}&darkpopout`;

    // Update chat header
    const header = document.querySelector(`#cw${num} .chat-header`);
    header.textContent = `${channel} – Chat`;
  }

  // Allow Enter in stream inputs
  document.getElementById('s1input').addEventListener('keydown', e => { if (e.key === 'Enter') loadStream(1); });
  document.getElementById('s2input').addEventListener('keydown', e => { if (e.key === 'Enter') loadStream(2); });
</script>
</body>
</html>
